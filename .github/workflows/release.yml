name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # The committed embedded libraries are what `go get` consumers run. Fail the
  # release if any commit has touched the Rust source since the assets were
  # last refreshed — the real staleness signal, not just file presence.
  verify-embedded-assets:
    name: Verify embedded assets are current
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check assets exist and postdate the Rust source
        shell: bash
        run: |
          set -euo pipefail
          sources=(crates Cargo.toml Cargo.lock rust-toolchain.toml scripts/install-ffi-library.sh)
          failed=0
          # Each platform's asset is checked individually: a commit that
          # changes the Rust source and refreshes only one platform must not
          # mask the others.
          for asset in \
            internal/ffi/lib/darwin_amd64/libmonty_ffi.dylib.gz \
            internal/ffi/lib/darwin_arm64/libmonty_ffi.dylib.gz \
            internal/ffi/lib/linux_amd64/libmonty_ffi.so.gz \
            internal/ffi/lib/linux_arm64/libmonty_ffi.so.gz
          do
            if [[ ! -s "${asset}" ]]; then
              echo "Missing embedded FFI asset: ${asset}" >&2
              failed=1
              continue
            fi
            asset_commit="$(git rev-list -1 HEAD -- "${asset}")"
            if [[ -n "$(git rev-list "${asset_commit}..HEAD" -- "${sources[@]}")" ]]; then
              echo "Stale embedded FFI asset: ${asset} (Rust source changed after its last refresh):" >&2
              git log --oneline "${asset_commit}..HEAD" -- "${sources[@]}" >&2
              failed=1
            fi
          done
          if [[ "${failed}" -ne 0 ]]; then
            echo "Wait for (or dispatch) the Refresh Embedded FFI Libraries workflow, then re-tag." >&2
            exit 1
          fi

  build:
    uses: ./.github/workflows/build-ffi.yml

  package:
    name: Package release artifacts
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: generated
          pattern: embedded-*

      - name: Package per-platform tarballs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for artifact_dir in generated/embedded-*; do
            name="$(basename "${artifact_dir}")"
            platform="${name#embedded-}"
            goos="${platform%-*}"
            goarch="${platform##*-}"
            asset="monty-go-${goos}-${goarch}"
            src="$(find "${artifact_dir}" -type f -name 'libmonty_ffi.*.gz' -print -quit)"
            mkdir -p "dist/${asset}"
            gunzip -c "${src}" > "dist/${asset}/$(basename "${src}" .gz)"
            cp README.md LICENSE "dist/${asset}/"
            tar -czf "dist/${asset}.tar.gz" -C dist "${asset}"
            shasum -a 256 "dist/${asset}.tar.gz" > "dist/${asset}.tar.gz.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: release-tarballs
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - package
      - verify-embedded-assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: dist
          name: release-tarballs

      - name: Publish assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --verify-tag --generate-notes
          gh release upload "$TAG" dist/*.tar.gz dist/*.sha256 --clobber
