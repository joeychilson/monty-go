# Keeps the committed embedded FFI libraries in sync with the Rust source:
# runs automatically when anything that affects the built library lands on
# main, and commits the refreshed assets back. The commit only touches
# internal/ffi/lib/**, which is outside this workflow's path filter, so it
# cannot retrigger itself. Manual dispatch remains available as an escape
# hatch.
name: Refresh Embedded FFI Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "scripts/install-ffi-library.sh"

permissions:
  contents: write

# Serialize refreshes so two pushes cannot race each other's commit.
concurrency:
  group: embedded-ffi-${{ github.ref }}

jobs:
  build:
    uses: ./.github/workflows/build-ffi.yml

  commit:
    name: Commit refreshed assets
    needs: build
    if: github.ref_type == 'branch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          path: generated
          pattern: embedded-*

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          for artifact_dir in generated/embedded-*; do
            name="$(basename "${artifact_dir}")"
            platform="${name#embedded-}"
            goos="${platform%-*}"
            goarch="${platform##*-}"
            src="$(find "${artifact_dir}" -type f -name 'libmonty_ffi.*.gz' -print -quit)"
            if [[ -z "${src}" ]]; then
              echo "No embedded FFI asset found in ${artifact_dir}" >&2
              exit 1
            fi
            dest_dir="internal/ffi/lib/${goos}_${goarch}"
            mkdir -p "${dest_dir}"
            cp "${src}" "${dest_dir}/$(basename "${src}")"
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/ffi/lib
          if git diff --cached --quiet; then
            echo "Embedded FFI assets are already current."
            exit 0
          fi
          git commit -m "Update embedded FFI libraries"
          # Tolerate commits that landed on main while this job ran.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
