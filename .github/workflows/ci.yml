name: CI

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs for the same ref on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      # The Rust toolchain version comes from rust-toolchain.toml.
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          test -z "$(gofmt -l $(git ls-files '*.go'))"
          cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -p monty-ffi --all-targets --all-features -- -D warnings

      - name: Test Rust FFI
        run: cargo test --release -p monty-ffi

      - name: Build Rust FFI
        run: cargo build --release -p monty-ffi

      - name: Install embedded FFI asset
        run: scripts/install-ffi-library.sh

      - name: Test Go
        env:
          # Require the embedded asset to exist and load with the current ABI,
          # so a stale committed library fails here instead of at a consumer.
          MONTY_GO_TEST_REQUIRE_EMBEDDED: "1"
        run: go test -race ./...

      - name: Vet Go
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.0
